[package]
name = "tokenixo"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[dependencies]
# ChatGPT tokenizer (cl100k_base)
tiktoken-rs = "0.11.0"

# Claude tokenizer (HuggingFace tokenizers)
tokenizers = "0.22.2"

# Gemini tokenizer (SentencePiece)
sentencepiece = "0.13.1"

# Platform directories (Application Support, Caches)
dirs = "5"

# Gzip decompression for bundled assets
flate2 = "1"

uniffi = { version = "0.28", features = ["cli"] }

[build-dependencies]
uniffi = { version = "0.28", features = ["build"] }

[profile.release]
opt-level     = "z"   # optimise for binary size
strip         = true  # strip symbols from the output binary
lto           = true  # whole-program link-time optimisation
codegen-units = 1     # single codegen unit for maximum LTO effectiveness
panic         = "abort"
