name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest

    permissions:
      contents: write   # required by softprops/action-gh-release to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (cmake)
        run: brew install cmake

      - name: Run Rust tests
        run: cargo test -- --nocapture

      - name: Build app bundle
        run: make app

      - name: Build DMG
        run: make dmg

      - name: Extract version from tag
        id: version
        # Strip the leading "v" from the tag name (e.g. "v0.2.0" → "0.2.0")
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tokenixo v${{ steps.version.outputs.version }}"
          make_latest: true
          files: "Tokenixo-${{ steps.version.outputs.version }}-macos.dmg"
